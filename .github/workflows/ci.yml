name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target/
          key: ${{ runner.os }}-target-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-test-
            ${{ runner.os }}-target-

      - name: Run tests
        run: cargo test --workspace --exclude surge-ui --verbose

      - name: Build mock_acp_agent for engine integration tests
        if: matrix.os == 'ubuntu-latest'
        run: cargo build -p surge-acp --bin mock_acp_agent

      - name: Run M5 engine integration tests (--ignored)
        if: matrix.os == 'ubuntu-latest'
        run: cargo test -p surge-orchestrator --tests -- --ignored
        timeout-minutes: 10
        # `--ignored` includes long-running e2e flows and tests that need an
        # external ACP agent; continue-on-error so a single one doesn't fail
        # the build. (Earlier comment blamed an "M5.1 bridge reply-routing
        # hang" — M5.1 has since landed and the AcpBridge::Drop deadlock that
        # caused those hangs is fixed; the gate stays for the genuinely
        # external-dep tests.)
        continue-on-error: true

  clippy:
    name: Clippy
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: |
            target/
          key: ${{ runner.os }}-target-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-clippy-
            ${{ runner.os }}-target-

      # Strict: M1's surge-core crate must be warning-free.
      - name: Run clippy (strict on surge-core)
        run: cargo clippy -p surge-core --all-targets --all-features -- -D warnings

      # Strict: M3's surge-acp crate (bridge::* + shared::*) must be warning-free.
      - name: Run clippy (strict on surge-acp)
        run: cargo clippy -p surge-acp --all-targets -- -D warnings

      # Permissive: legacy crates have accumulated clippy debt that's tracked
      # as separate cleanup work, not blocking. We still run clippy to catch
      # new errors / clippy::correctness regressions, but don't fail on warnings.
      - name: Run clippy (permissive on workspace)
        run: cargo clippy --workspace --all-targets --all-features

  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check
