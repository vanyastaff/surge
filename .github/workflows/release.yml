name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  RUST_BACKTRACE: short

jobs:
  build-release:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: surge.exe
            asset_name: surge-x86_64-pc-windows-msvc.exe

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: surge
            asset_name: surge-x86_64-apple-darwin

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: surge
            asset_name: surge-aarch64-apple-darwin

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: surge
            asset_name: surge-x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: surge-release-${{ matrix.target }}
          # Release builds always populate the cache — they're rare and
          # the cache speeds up the next release run.
          save-if: true
          cache-on-failure: true

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --package surge-cli --locked

      - name: Strip binary (Linux and macOS)
        if: matrix.os != 'windows-latest'
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Prepare release assets
        run: |
          mkdir -p ./release-assets
          find ./artifacts -type f -exec mv {} ./release-assets/ \;
          ls -l ./release-assets

      - uses: softprops/action-gh-release@v2
        with:
          files: ./release-assets/*
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
