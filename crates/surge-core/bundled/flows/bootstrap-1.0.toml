# Bootstrap flow — Description Author -> Roadmap Planner -> Flow Generator.
#
# This graph drives the adaptive bootstrap run. Each authoring agent is
# followed by a bootstrap-mode HumanGate. Operator `edit` choices backtrack
# to the preceding agent with fresh `edit_feedback`; `reject` fails the run.

schema_version = 1
start = "description_author"

[metadata]
name = "bootstrap"
description = "Three-stage adaptive bootstrap flow that materializes a follow-up flow.toml."
created_at = "2026-05-07T00:00:00Z"
author = "surge"

[nodes.description_author]
id = "description_author"

[nodes.description_author.position]
x = 0.0
y = 0.0

[[nodes.description_author.declared_outcomes]]
id = "drafted"
description = "description.md drafted and ready for review"
edge_kind_hint = "forward"
is_terminal = false

[[nodes.description_author.declared_outcomes]]
id = "needs_clarification"
description = "description could not be drafted without more input"
edge_kind_hint = "forward"
is_terminal = false

[nodes.description_author.config]
node_kind = "agent"
profile = "description-author@1.0"

[[nodes.description_author.config.bindings]]
target = "user_prompt"
source = { type = "initial_prompt" }

[[nodes.description_author.config.bindings]]
target = "edit_feedback"
source = { type = "edit_feedback", from_node = "description_author" }

[nodes.description_gate]
id = "description_gate"

[nodes.description_gate.position]
x = 260.0
y = 0.0

[[nodes.description_gate.declared_outcomes]]
id = "approve"
description = "description.md approved"
edge_kind_hint = "forward"
is_terminal = false

[[nodes.description_gate.declared_outcomes]]
id = "edit"
description = "description.md needs edits"
edge_kind_hint = "backtrack"
is_terminal = false

[[nodes.description_gate.declared_outcomes]]
id = "reject"
description = "bootstrap rejected at description review"
edge_kind_hint = "escalate"
is_terminal = true

[nodes.description_gate.config]
node_kind = "human_gate"
delivery_channels = []
allow_freetext = true
mode = { bootstrap = { stage = "description" } }

[nodes.description_gate.config.summary]
title = "Approve description?"
body = "Review description.md and choose approve, edit, or reject."

[[nodes.description_gate.config.options]]
outcome = "approve"
label = "Approve"
style = "primary"

[[nodes.description_gate.config.options]]
outcome = "edit"
label = "Edit"
style = "warn"

[[nodes.description_gate.config.options]]
outcome = "reject"
label = "Reject"
style = "danger"

[nodes.roadmap_planner]
