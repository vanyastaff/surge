profile = "roadmap-planner@1.0"

[[nodes.roadmap_planner.config.bindings]]
target = "user_prompt"
source = { type = "initial_prompt" }

[[nodes.roadmap_planner.config.bindings]]
target = "description_artifact"
source = { type = "node_output", node = "description_author", artifact = "description" }

[[nodes.roadmap_planner.config.bindings]]
