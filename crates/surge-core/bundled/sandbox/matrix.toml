# ── Gemini CLI ───────────────────────────────────────────────────────────────
# Gemini CLI's native sandbox is Docker/Podman-only. Surge cannot honour the
# read-only / workspace-write / workspace-network tiers against a non-Docker
# Gemini launch — those rows stay declared-unverified so the resolver refuses
# to start a non-doctor run rather than silently downgrade. Only `full-access`
# is verified: it maps to Gemini's `--yolo` flag (skip approvals; the Docker
# sandbox itself is orthogonal).

[[rows]]
runtime = "gemini"
mode = "read-only"
flags = []
verified = false
note = "Gemini CLI native sandbox is Docker/Podman-only — read-only mapping requires the user to opt into Docker sandboxing externally. Refuses to start a non-doctor run rather than silently downgrading."

[[rows]]
runtime = "gemini"
mode = "workspace-write"
flags = []
verified = false
note = "Gemini CLI native sandbox is Docker/Podman-only — workspace-write mapping requires the user to opt into Docker sandboxing externally. Refuses to start a non-doctor run rather than silently downgrading."

[[rows]]
runtime = "gemini"
mode = "workspace-network"
flags = []
verified = false
note = "Gemini CLI native sandbox is Docker/Podman-only — workspace+network mapping requires Docker sandboxing externally. Refuses to start a non-doctor run rather than silently downgrading."

[[rows]]
runtime = "gemini"
mode = "full-access"
flags = ["--yolo"]
verified = true
min_version = ">=0.4.0"
note = "Gemini CLI full-access: --yolo skips approval prompts. Surge logs `warn` whenever this row is resolved. Docker sandboxing is orthogonal and configured by the user."

