# Sandbox delegation matrix — runtime × mode → launch flags.
#
# Each row maps a (runtime, SandboxMode) pair to the launch-flag tail that
# surge appends to the agent's command line. The structure is locked by
# `surge-core::sandbox_matrix::RuntimeSandboxRow`.
#
# Invariants enforced by tests in `sandbox_matrix.rs`:
#   - No row may carry `verified = true` AND `flags = []` (a verified row
#     means surge tested the launch flags against the live runtime).
#   - No row may declare `mode = "custom"` — Custom is handled out-of-band
#     by `SandboxConfig::Custom` validation, not by matrix lookup.
#   - Every unverified row carries a non-empty `note` field pointing at the
#     upstream issue / docs page where the gap will be closed.
#
# Provenance: rows for the v0.1 verified runtimes (Claude Code, Codex,
# Gemini) ship empty here and are populated by Tasks 4 and 5 of the
# "Sandbox delegation matrix" milestone — see
# `.ai-factory/plans/sandbox-delegation-matrix.md`. Declared-unverified rows
# for Cursor / Copilot / OpenCode / Goose are populated by Task 6.

