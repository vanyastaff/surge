# cargo-deny configuration — license compliance + supply-chain gates.
# Run locally with `cargo deny check`; CI runs `cargo deny check licenses`
# and `cargo deny check bans sources` (see .github/workflows/security.yml).
#
# Surge itself is dual-licensed MIT OR Apache-2.0; every dependency must
# carry an OSI-approved permissive license from the allow-list below.

[graph]
all-features = true

[licenses]
# SPDX identifiers we accept. All permissive / weak-copyleft licenses
# compatible with shipping a dual MIT/Apache-2.0 binary.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "CC0-1.0",
    "0BSD",
    # NCSA (University of Illinois/NCSA) — permissive BSD-style; reached via
    # libfuzzer-sys in the fuzz tooling tree.
    "NCSA",
    # CDLA-Permissive-2.0 — permissive data license on the Mozilla root
    # certificate bundle (webpki-roots, transitive via rustls/reqwest).
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8
# Per-crate license clarifications go here if a crate's license is only
# discoverable from a non-standard file. None needed today.
exceptions = []

[advisories]
# RustSec advisory DB gates live in `cargo audit` (security.yml); keep the
# advisories check here lenient so a fresh advisory doesn't break the
# license gate. `unmaintained` is scoped to direct deps to cut noise.
yanked = "warn"
unmaintained = "workspace"

[bans]
# Surge does not currently pin against duplicate versions — the workspace
# is young and transitive duplicates are common. Revisit before 1.0.
multiple-versions = "allow"
wildcards = "warn"
# Internal workspace crates are referenced by path with no version req;
# that is intentional, not a wildcard-version hazard.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
