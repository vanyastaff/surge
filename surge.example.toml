# Surge configuration
# Copy to your project root as `surge.toml`

default_agent = "claude"

# Example 1: Basic agent configuration (local installation)
[agents.claude]
command = "claude"
transport = "stdio"

# Example 2: Agent with capability metadata
# Capabilities help Surge route tasks to the most appropriate agent
[agents.copilot]
command = "copilot"
transport = "stdio"
capabilities = ["code", "plan", "review", "chat"]

# Example 3: npx-based agent (no local installation required)
# This runs the agent via npx, downloading it on-demand
[agents.claude-acp]
command = "npx"
args = ["@zed-industries/claude-agent-acp"]
transport = "stdio"
capabilities = ["code", "plan", "review", "test", "refactor", "chat"]

# Example 4: Custom agent from PATH with custom args
[agents.custom-agent]
command = "/usr/local/bin/my-custom-agent"
args = ["--verbose", "--log-level=debug"]
transport = "stdio"
capabilities = ["code", "test"]

# Example 5: TCP transport agent (for remote agents)
[agents.remote-agent]
command = "remote-agent-client"
capabilities = ["code", "review"]
transport = { tcp = { host = "localhost", port = 8080 } }

# Example 6: Agent with MCP servers (Model Context Protocol)
# MCP servers provide additional context and tools to the agent
[agents.claude-with-mcp]
command = "claude"
transport = "stdio"
capabilities = ["code", "plan", "review", "test", "refactor", "chat"]

[[agents.claude-with-mcp.mcp_servers]]
name = "filesystem"
command = "npx"
args = ["@modelcontextprotocol/server-filesystem", "/path/to/workspace"]

[[agents.claude-with-mcp.mcp_servers]]
name = "git"
command = "npx"
args = ["@modelcontextprotocol/server-git"]

# Capability reference:
# - "code"     : Write and modify code
# - "plan"     : Create implementation plans
# - "review"   : Code review and QA
# - "test"     : Write and run tests
# - "refactor" : Refactor existing code
# - "chat"     : General conversation and assistance

[pipeline]
max_qa_iterations = 10
max_parallel = 3

[pipeline.gates]
after_spec = true           # Wait for user approval after spec generation
after_plan = true           # Wait for user approval after plan generation
after_each_subtask = false  # Don't pause between subtasks
after_qa = true             # Wait for user approval after QA

# Resilience and retry configuration
[resilience]
connect_timeout_secs = 30        # Timeout for agent process spawn and ACP init
session_timeout_secs = 60        # Timeout for new_session ACP call
prompt_timeout_secs = 300        # Timeout for prompt ACP call (5 minutes)
prompt_retries = 3               # Max retries for failed prompts
shutdown_grace_secs = 5          # Grace period before SIGKILL
circuit_breaker_threshold = 5    # Trip circuit breaker after N consecutive failures
auth_failure_immediate_fail = true  # Don't retry on 401 auth errors

# Retry policy with exponential backoff (default)
[resilience.retry_policy]
max_retries = 3                  # Maximum retry attempts
initial_delay_ms = 1000          # Initial delay: 1 second
max_delay_ms = 60000             # Maximum delay: 60 seconds
backoff_strategy = "exponential" # Options: "linear", "exponential", "exponential_jitter"

# Example: Aggressive retry with jitter (uncomment to use)
# [resilience.retry_policy]
# max_retries = 5
# initial_delay_ms = 500
# max_delay_ms = 30000
# backoff_strategy = "exponential_jitter"  # Adds randomness to prevent thundering herd

# Example: Conservative retry with linear backoff (uncomment to use)
# [resilience.retry_policy]
# max_retries = 2
# initial_delay_ms = 2000
# max_delay_ms = 10000
# backoff_strategy = "linear"  # Fixed delay between retries
