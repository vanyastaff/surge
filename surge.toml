default_agent = "test-agent"

[agents.myagent]
args = []
command = "C:/Program Files/Git/usr/bin/myagent"
transport = "stdio"

[agents.test-agent]
args = ["test"]
command = "echo"
transport = "stdio"

[pipeline]
max_parallel = 3
max_qa_iterations = 10

[pipeline.gates]
after_each_subtask = false
after_plan = true
after_qa = true
after_spec = true
